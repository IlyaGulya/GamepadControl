version: 1
shell: /bin/zsh

groups:
  browser:
    - company.thebrowser.Browser  # Arc
    - app.zen-browser.zen         # Zen
  messaging:
    - ru.keepcoder.Telegram       # Telegram Desktop
    - org.telegram.desktop        # Telegram Desktop alternate id
    - com.tdesktop.Telegram       # Telegram Desktop alternate id
  wezterm:
    - com.github.wez.wezterm      # WezTerm
  cmux:
    - com.cmuxterm.app             # cmux

rules:
  common:
    buttons:
      # === Face buttons ===
      a:
        hold_click: left
      x:
        hold_click: right
      y:
        click: double
      b:
        keystroke: escape
      start:
        tap: enter
      back:
        tap: cmd+w

      # === D-pad ===
      dpad_up:
        keystroke: arrow_up
      dpad_down:
        keystroke: arrow_down
      dpad_left:
        keystroke: arrow_left
      dpad_right:
        keystroke: arrow_right

      # === Bumpers — voice input (raw modifier for FlagsChanged events) ===
      lb:
        rawkey: rcmd
      rb:
        rawkey: ralt

      # === Navigation layer (LT + button) ===
      lt+a:
        shell: aerospace focus dfs-next
      lt+b:
        shell: aerospace focus dfs-prev
      lt+dpad_left:
        keystroke: cmd+shift+[
        repeat_delay_ms: 300
        repeat_interval_ms: 120
      lt+dpad_right:
        keystroke: cmd+shift+]
        repeat_delay_ms: 300
        repeat_interval_ms: 120
      lt+dpad_up:
        tap: cmd+k
      lt+dpad_down:
        tap: cmd+l
      lt+start:
        tap: cmd+t
      lt+back:
        tap: cmd+q
      lt+x:
        tap: cmd+f
      lt+y:
        tap: cmd+space

      # === Window layer (RT + button, AeroSpace CLI) ===
      rt+dpad_left:
        shell: aerospace focus left
      rt+dpad_right:
        shell: aerospace focus right
      rt+dpad_up:
        shell: aerospace focus up
      rt+dpad_down:
        shell: aerospace focus down
      rt+a:
        shell: aerospace move left
      rt+b:
        shell: aerospace move right
      rt+x:
        shell: aerospace fullscreen
      rt+y:
        shell: aerospace layout tiles horizontal vertical

      # === RT + start — workspace switcher ===
      rt+start:
        shell: aerospace workspace 1

    sticks:
      left:
        mode: mouse_move
        deadzone: 0.15
        max_speed_px_s: 2800
        gamma: 2.0
        tick_ms: 2
        smoothing_window_ms: 12
        precision_button: lt
        precision_multiplier: 0.25
      right:
        mode: scroll
        deadzone: 0.15
        speed_lines_s: 120
        gamma: 1.5
        tick_ms: 4
        smoothing_window_ms: 25
        trigger_boost_max: 5.0
        trigger_boost_gamma: 1.5
        horizontal: true
        axis_lock: true

  $messaging:
    buttons:
      lt+dpad_left:
        tap: cmd+shift+arrow_up
      lt+dpad_right:
        tap: cmd+shift+arrow_down
      dpad_up:
        tap: cmd+shift+tab
      dpad_down:
        tap: cmd+tab
      rt+a:
        tap: cmd+1
      rt+b:
        tap: cmd+2
      rt+x:
        tap: cmd+3
      rt+y:
        tap: cmd+4
      rt+start:
        tap: cmd+9
      rt+back:
        tap: cmd+0

  $cmux:
    buttons:
      # === Workspace вверх/вниз ===
      lt+dpad_up:
        keystroke: ctrl+cmd+[
        repeat_delay_ms: 300
        repeat_interval_ms: 120
      lt+dpad_down:
        keystroke: ctrl+cmd+]
        repeat_delay_ms: 300
        repeat_interval_ms: 120

      # === Управление ===
      lt+start:
        tap: cmd+n
      lt+back:
        tap: cmd+shift+w

      # === Сплиты ===
      lt+x:
        tap: cmd+d
      lt+y:
        tap: cmd+shift+d
